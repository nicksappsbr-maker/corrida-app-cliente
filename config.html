<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Configurar Valores</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0;
  }
  header {
    padding: 14px 18px; background: #111827; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #1f2937;
  }
  header h1 { font-size: 17px; margin: 0; }
  header a { color: #38bdf8; text-decoration: none; font-size: 13px; }
  .container { max-width: 420px; margin: 0 auto; padding: 16px; }
  .card { background: #1e293b; border-radius: 14px; padding: 20px; }
  label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; margin-top: 14px; }
  input[type=number] {
    width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #334155;
    background: #0f172a; color: #e2e8f0; font-size: 16px;
  }
  button {
    border: none; border-radius: 10px; padding: 12px 16px; font-size: 14px; font-weight: 600;
    cursor: pointer; background: #38bdf8; color: #0f172a; width: 100%; margin-top: 20px;
  }
  .hint { font-size: 12px; color: #64748b; margin-top: 10px; text-align: center; }
  .exemplo {
    background: #0f172a; border-radius: 10px; padding: 12px; margin-top: 16px; font-size: 13px; color: #94a3b8;
  }
  .exemplo b { color: #4ade80; }
</style>
</head>
<body>

<header>
  <h1>⚙️ Configurar Valores por KM</h1>
  <a href="index.html">← voltar</a>
</header>

<div class="container">
  <div class="card">
    <label>Valor por KM rodado (R$)</label>
    <input type="number" id="valorKm" step="0.01" min="0" />

    <label>Taxa base (custo fixo por corrida, R$)</label>
    <input type="number" id="taxaBase" step="0.01" min="0" />

    <label>Valor mínimo da corrida (R$)</label>
    <input type="number" id="valorMinimo" step="0.01" min="0" />

    <button onclick="salvar()">Salvar configuração</button>
    <div class="hint" id="hint"></div>

    <div class="exemplo" id="exemplo"></div>
  </div>
</div>

<script>
const API_BASE = localStorage.getItem("api_base") || "https://corrida-app-server.onrender.com";

async function carregar() {
  const resp = await fetch(`${API_BASE}/api/config-precos`);
  const dados = await resp.json();
  document.getElementById("valorKm").value = dados.valor_km;
  document.getElementById("taxaBase").value = dados.taxa_base;
  document.getElementById("valorMinimo").value = dados.valor_minimo;
  atualizarExemplo();
}

function atualizarExemplo() {
  const valorKm = parseFloat(document.getElementById("valorKm").value) || 0;
  const taxaBase = parseFloat(document.getElementById("taxaBase").value) || 0;
  const valorMinimo = parseFloat(document.getElementById("valorMinimo").value) || 0;
  const valor5km = Math.max(taxaBase + 5 * valorKm, valorMinimo);
  document.getElementById("exemplo").innerHTML =
    `Exemplo: uma corrida de <b>5 km</b> custaria <b>R$ ${valor5km.toFixed(2).replace(".", ",")}</b>`;
}

["valorKm", "taxaBase", "valorMinimo"].forEach(id =>
  document.getElementById(id).addEventListener("input", atualizarExemplo)
);

async function salvar() {
  const valor_km = parseFloat(document.getElementById("valorKm").value);
  const taxa_base = parseFloat(document.getElementById("taxaBase").value);
  const valor_minimo = parseFloat(document.getElementById("valorMinimo").value);
  const hint = document.getElementById("hint");

  if (isNaN(valor_km) || isNaN(taxa_base) || isNaN(valor_minimo)) {
    hint.textContent = "Preencha todos os campos.";
    return;
  }

  await fetch(`${API_BASE}/api/config-precos`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ valor_km, taxa_base, valor_minimo })
  });
  hint.textContent = "Configuração salva com sucesso ✅";
  setTimeout(() => hint.textContent = "", 2500);
}

carregar();
</script>
</body>
</html>
